<div class="site-nav">
    <a href="{{ relURL .Site.Home.RelPermalink }}" class="title">
        <h1>{{ .Site.Title }}</h1>
    </a>
    <ul class="menu menu-social">
        {{ range.Site.Menus.social -}}
        <li>
            <a href="{{ .URL }}" target="_blank" rel="noopener noreferrer">
                {{ partial "icon.html" (dict "icon" .Pre "title" .Name ) }}
            </a>
        </li>
        {{- end }}
        <li>
            <a href="/protected-email" obfuscated-email="{{ .Site.Params.author.email }}">
                {{ partial "icon.html" (dict "icon" "envelope" "title" "Email") }}
            </a>
        </li>
    </ul>
</div>
<nav>
    {{ range .Site.Menus.main.ByWeight }}
        <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
</nav>
